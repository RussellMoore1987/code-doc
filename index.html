<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="alternate icon" href="/apple-touch-icon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <title>Adilas Docs</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════════ HEADER -->
  <header class="site-header" role="banner">
    <div class="header-inner">
      <div class="header-brand">
        <img src="/images/dark_logo.svg" alt="Adilas Logo" class="dark-logo logo" style="width: 60px;">
        <img src="/images/logo.svg" alt="Adilas Logo" class="light-logo logo" style="width: 60px;">
        <span class="brand-title">Adilas</span>
      </div>
      <nav class="header-nav" aria-label="Header navigation">
        <a href="#" class="header-nav-link">Guides</a>
        <a href="#" class="header-nav-link">API</a>
        <a href="#" class="header-nav-link">Community</a>
      </nav>
      <div class="header-actions">
        <div class="search-container" id="search-container">
          <button id="search-toggle" class="btn-icon" aria-label="Open search" title="Search documentation">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
              <circle cx="11" cy="11" r="8" stroke="currentColor" stroke-width="2" fill="none"/>
              <path d="m21 21-4.35-4.35" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="search-input-wrapper" id="search-input-wrapper">
            <input type="text" id="search-input" placeholder="Search documentation..." autocomplete="off" aria-label="Search documentation">
            <button id="search-close" class="btn-icon search-close-btn" aria-label="Close search">
              <svg viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                <line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                <line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <div class="search-results" id="search-results" role="listbox" aria-label="Search results"></div>
          <div class="search-error-message" id="search-error-message"></div>
        </div>
        <button id="theme-toggle" class="btn-icon" aria-label="Toggle light/dark mode" title="Toggle theme">
          <span class="icon-light" aria-hidden="true">
            <!-- Sun -->
            <svg viewBox="0 0 24 24" width="18" height="18"><circle cx="12" cy="12" r="4.5" stroke="currentColor" stroke-width="2" fill="none"/><line x1="12" y1="2" x2="12" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="2" y1="12" x2="5" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="19" y1="12" x2="22" y2="12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4.22" y1="4.22" x2="6.34" y2="6.34" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="17.66" y1="17.66" x2="19.78" y2="19.78" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="4.22" y1="19.78" x2="6.34" y2="17.66" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="17.66" y1="6.34" x2="19.78" y2="4.22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </span>
          <span class="icon-dark" aria-hidden="true">
            <!-- Moon -->
            <svg viewBox="0 0 24 24" width="18" height="18"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </span>
        </button>
      </div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════ MAIN WRAPPER -->
  <div class="page-body">
    <div class="app-wrapper" id="app-wrapper">

      <!-- ─── LEFT SIDEBAR ─── -->
      <aside class="sidebar sidebar-left" id="sidebar-left" aria-label="Primary navigation">
        <div class="sidebar-header">
          <span class="sidebar-label">Contents</span>
          <button class="btn-icon sidebar-collapse-btn" id="collapse-left" aria-label="Collapse left sidebar" title="Collapse">
            <svg viewBox="0 0 24 24" width="16" height="16"><polyline points="15 18 9 12 15 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <nav class="left-nav" id="left-nav" aria-label="Documentation sections">
          <!-- Built by app.js -->
        </nav>
      </aside>

      <!-- LEFT COLLAPSE STRIP (shown when left sidebar is collapsed) -->
      <div class="sidebar-strip sidebar-strip-left" id="strip-left" aria-hidden="true">
        <button class="btn-icon sidebar-expand-btn" id="expand-left" aria-label="Expand left sidebar" title="Expand navigation">
          <svg viewBox="0 0 24 24" width="16" height="16"><polyline points="9 18 15 12 9 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <!-- LEFT RESIZE HANDLE -->
      <div class="resize-handle resize-handle-left" id="resize-left" role="separator" aria-orientation="vertical" aria-label="Resize left sidebar" tabindex="0"></div>

      <!-- ─── CENTER CONTENT ─── -->
      <main class="content-main" id="content-main" role="main" aria-label="Documentation content">
        <!-- Search navigation controls (shown when highlighting matches) -->
        <div class="search-nav-controls" id="search-nav-controls">
          <span id="search-match-info">1 of 3 matches</span>
          <button id="search-prev-btn" class="search-nav-btn">Previous</button>
          <button id="search-next-btn" class="search-nav-btn">Next</button>
          <button id="search-clear-btn" class="search-nav-btn">Clear</button>
        </div>
        
        <div class="content-scroll" id="content-scroll" tabindex="0">
          <div class="content-body" id="content-body">
            <!-- Loaded via Ajax -->
            <div class="welcome-screen">
              <div class="welcome-inner">
                <svg viewBox="0 0 48 48" width="64" height="64" aria-hidden="true" class="welcome-icon">
                  <rect x="4" y="4" width="40" height="40" rx="6" fill="currentColor" opacity=".1"/>
                  <path d="M12 16h24M12 24h16M12 32h19" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                </svg>
                <h1>Welcome to DevDocs</h1>
                <p>Select a topic from the navigation on the left to get started.</p>
              </div>
            </div>
          </div>
        </div>
      </main>

      <!-- RIGHT RESIZE HANDLE -->
      <div class="resize-handle resize-handle-right" id="resize-right" role="separator" aria-orientation="vertical" aria-label="Resize right sidebar" tabindex="0"></div>

      <!-- RIGHT COLLAPSE STRIP (shown when right sidebar is collapsed) -->
      <div class="sidebar-strip sidebar-strip-right" id="strip-right" aria-hidden="true">
        <button class="btn-icon sidebar-expand-btn" id="expand-right" aria-label="Expand right sidebar" title="Expand on this page">
          <svg viewBox="0 0 24 24" width="16" height="16"><polyline points="15 18 9 12 15 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>

      <!-- ─── RIGHT SIDEBAR ─── -->
      <aside class="sidebar sidebar-right" id="sidebar-right" aria-label="On this page">
        <div class="sidebar-header">
          <span class="sidebar-label">On this page</span>
          <button class="btn-icon sidebar-collapse-btn" id="collapse-right" aria-label="Collapse right sidebar" title="Collapse">
            <svg viewBox="0 0 24 24" width="16" height="16"><polyline points="9 18 15 12 9 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
        <nav class="right-nav" id="right-nav" aria-label="Page sections">
          <p class="right-nav-empty">Load a page to see its outline.</p>
        </nav>
      </aside>

    </div><!-- /.app-wrapper -->
  </div><!-- /.page-body -->

  <!-- ═══════════════════════════════════════════ FOOTER -->
  <footer class="site-footer" role="contentinfo">
    <div class="footer-inner">
      <span class="footer-copy">&copy; 2026 DevDocs. All rights reserved.</span>
      <nav class="footer-nav" aria-label="Footer navigation">
        <a href="#">Privacy</a>
        <a href="#">Terms</a>
        <a href="#">Contact</a>
      </nav>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
